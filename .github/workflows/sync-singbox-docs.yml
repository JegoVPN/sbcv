name: Sync sing-box docs

# Daily mirror of the official sing-box documentation into docs/upstream/.
# Re-runs scripts/sync-singbox-docs.mjs with FORCE and opens a PR ONLY when the
# upstream docs actually changed (the script writes no wall-clock timestamp, so an
# unchanged upstream produces no diff). Manual runs via "Run workflow".

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-singbox-docs
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync upstream docs (force re-pull)
        env:
          FORCE_SYNC_SING_BOX_DOCS: "1"
        run: node scripts/sync-singbox-docs.mjs

      - name: Open PR if docs changed
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: docs/upstream/**
          branch: chore/singbox-docs-sync
          delete-branch: true
          sign-commits: true
          commit-message: "chore(docs): sync sing-box upstream docs"
          title: "chore(docs): sync sing-box upstream docs"
          body: |
            Automated daily sync of the official sing-box docs mirror.

            - Source: https://github.com/SagerNet/sing-box (`testing`/`stable`/`oldstable`)
            - Generated by `scripts/sync-singbox-docs.mjs` (see each branch's `SYNC_INFO.txt` for the source commit)
            - This PR only appears when the upstream docs actually changed.
          labels: |
            docs
            automated
