# Root wrangler.toml for the SBC editor (sbcv.app).
#
# Cloudflare merged Pages into Workers Builds; sbcv.app is deployed as a
# Workers Static Assets project, not a classic Pages project. The Cloudflare
# Dashboard "Workers Builds" flow runs `pnpm build` then `npx wrangler deploy`
# at the repo root, which finds this file.
#
# The API gateway lives in worker/ and has its own wrangler.toml.
# Cloudflare Containers / validator container live in container/.

name = "sbcv-app"
compatibility_date = "2026-05-01"
workers_dev = false

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

# Custom domains for sbcv.app + www.sbcv.app are configured in the Cloudflare
# Dashboard (Workers & Pages -> sbcv-app -> Custom domains), not here. The
# domain must be on the same Cloudflare account/zone, which sbcv.app already is.

# ---- Environments -----------------------------------------------------------

[env.preview]
name = "sbcv-app-preview"
workers_dev = true
