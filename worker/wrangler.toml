# Production deploys are driven by Cloudflare Workers Builds via
# scripts/cf-deploy-validator-gw.sh, which gates on worker/+container/
# changes and verifies the rolled-out container image tag.

name = "sbc-validator-gw"
main = "src/index.ts"
compatibility_date = "2026-05-01"
workers_dev = false

# Custom domain on api.sbcv.app. Cloudflare creates the DNS record automatically
# on first deploy because the sbcv.app zone lives in the same account.
routes = [
  { pattern = "api.sbcv.app", custom_domain = true }
]

# Plain config vars. Override per-env in [env.staging] if needed.
[vars]
ALLOWED_ORIGIN = "https://sbcv.app,https://www.sbcv.app"
MAX_BODY_BYTES = "524288"
CHECK_TIMEOUT_MS = "30000"
VALIDATOR_VERSION = "v2"
RATE_LIMIT_PER_MIN = "30"

# KV cache binding (created via `wrangler kv namespace create CHECK_CACHE`).
[[kv_namespaces]]
binding = "CHECK_CACHE"
id = "a07b9eb778a84bbaa2c537019c21c0f4"

# Secrets (set via `wrangler secret put`, not committed):
#   wrangler secret put INTERNAL_TOKEN
#   wrangler secret put TURNSTILE_SECRET_KEY    # optional; empty = skip Turnstile

# ---- Cloudflare Containers binding ------------------------------------------
# `env.VALIDATOR` is the Container Durable Object the Worker forwards to.
# The image is built from container/Dockerfile and registered on `wrangler deploy`.

[[containers]]
class_name = "ValidatorContainer"
image = "../container/Dockerfile"
instance_type = "lite"
max_instances = 3
observability = { enabled = true }

[[durable_objects.bindings]]
class_name = "ValidatorContainer"
name = "VALIDATOR"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ValidatorContainer"]

# ---- Worker observability (Workers Logs + traces) ---------------------------
# Mirror of the Cloudflare Dashboard settings so dashboard <-> wrangler.toml
# do not drift on each deploy. Logs are persisted; traces stay off.

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# ---- Environments -----------------------------------------------------------

[env.staging]
name = "sbc-validator-gw-staging"
routes = [
  { pattern = "api-staging.sbcv.app", custom_domain = true }
]

[env.staging.vars]
ALLOWED_ORIGIN = "https://staging.sbcv.app"
MAX_BODY_BYTES = "524288"
CHECK_TIMEOUT_MS = "30000"
VALIDATOR_VERSION = "v2"
RATE_LIMIT_PER_MIN = "60"

[[env.staging.kv_namespaces]]
binding = "CHECK_CACHE"
id = "fd4f8ffa966a4bd481220e95fcc109d5"

[[env.staging.containers]]
class_name = "ValidatorContainer"
image = "../container/Dockerfile"
instance_type = "lite"
max_instances = 1
observability = { enabled = true }

[[env.staging.durable_objects.bindings]]
class_name = "ValidatorContainer"
name = "VALIDATOR"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["ValidatorContainer"]

[env.staging.observability]
enabled = true
head_sampling_rate = 1

[env.staging.observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[env.staging.observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
